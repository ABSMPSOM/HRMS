<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-end bg-cover bg-center px-16"
        style="background-image: url('{{ url_for('static', filename='images/login_bg.png') }}'); background-size: cover; background-position: right; background-repeat: no-repeat;">

    <div id="forgot-card" class=" bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl rounded-2xl w-[550px] p-8 mr-10">

        <div class="text-center mb-6 gsap-element">
            <img src="{{ url_for('static', filename='images/login_logo.png') }}" alt="HRMS Logo" class="mx-auto w-[180px] h-auto rounded-full">
        </div>

        <h2 class="text-2xl font-extrabold text-center text-white mb-2 gsap-element">Forgot Password</h2>
        <p class="text-sm text-center text-gray-300 mb-6 gsap-element">
            Enter your registered email address <br class="hidden sm:block"> to reset your password.
        </p>

        <div id="msgBox" class="hidden text-center text-xs p-2 rounded mb-4 font-bold"></div>

        <form id="resetForm" class="space-y-6" onsubmit="event.preventDefault();">
            <div class="gsap-element text-left">
                <label for="email" class="block text-sm font-semibold text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="email" name="email" placeholder="name@company.com" required
                        class="w-full bg-white/5 border border-gray-500 rounded-lg pl-11 pr-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 transition-all duration-300">
                </div>
            </div>

            <button type="button" id="sendOtpBtn" class="w-full bg-purple-600 hover:bg-purple-700 hover:scale-[1.02] transition-all duration-300 text-white font-bold py-3 rounded-lg">
                Send OTP
            </button>

            <div id="otpSection" class="hidden mt-6">
                <label class="block text-sm text-gray-300 mb-2">Enter OTP</label>
                <input type="text" id="otp" maxlength="6" placeholder="Enter 6-digit OTP" class="w-full bg-white/5 border border-gray-500 rounded-lg px-4 py-3 text-white text-center tracking-widest text-lg font-bold">
                
                <button type="button" id="verifyOtpBtn" class="w-full mt-4 bg-purple-600 hover:bg-purple-700 hover:scale-[1.02] transition-all duration-300 text-white font-bold py-3 rounded-lg">
                    Verify OTP
                </button>
            </div>

            <div id="resetSection" class="hidden mt-6">
                <label class="block text-sm text-gray-300 mb-2">New Password</label>
                <input type="password" id="newPassword" class="w-full bg-white/5 border border-gray-500 rounded-lg px-4 py-3 text-white">

                <label class="block text-sm text-gray-300 mt-5 mb-2">Confirm Password</label>
                <input type="password" id="confirmPassword" class="w-full bg-white/5 border border-gray-500 rounded-lg px-4 py-3 text-white">
                <p id="passwordMessage" class="text-sm mt-2 font-bold"></p>

                <button type="button" id="submitResetBtn" class="w-full mt-5 bg-purple-600 hover:bg-purple-700 hover:scale-[1.02] transition-all duration-300 text-white font-bold py-3 rounded-lg">
                    Reset Password
                </button>
            </div>
        </form>

        <div class="mt-8 text-center gsap-element">
            <a href="{{ url_for('login') }}" class="inline-flex items-center text-sm text-gray-300 hover:text-white transition">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/forget_pass.js') }}"></script>
</body>
</html>
