<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRMS - Verify Identity Access Token</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkBg: '#121212', cardBg: '#1e1e1e', brandPurple: '#b244d4' } } } }
    </script>
</head>
<body class="min-h-screen flex items-center justify-end bg-cover bg-center px-16"
        style="background-image: url('{{ url_for('static', filename='images/login_bg.png') }}'); background-size: cover; background-position: right; background-repeat: no-repeat;">

    <div class="auth-card bg-white/10 backdrop-blur-xl p-8 rounded-2xl border border-white/20 shadow-2xl w-[550px] h-auto mr-10">
        <div>
            <img src="{{url_for('static',filename='images/login_logo.png')}}" alt="HRMS Logo" class="mx-auto mb-2 w-[180px] h-auto rounded-full">
            <p class="text-lg font-bold text-white text-center">SECURITY VERIFICATION</p>
        </div>
        
        <h2 class="text-base font-medium mb-2 text-white text-center">Enter Security Verification Pin Code</h2>
        <p class="text-xs text-gray-400 mb-6 text-center">A time-sensitive security token was delivered to <br><span class="text-sky-400 font-extrabold text-sm">{{ email }}</span></p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500/20 border border-red-500 text-red-300 text-xs p-2 rounded mb-4 text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('verify_otp', email=email) }}" method="POST" id="otp-form">
            <div class="mb-8">
                <div class="flex justify-between gap-3" id="otp-container">
                    <input type="text" maxlength="1" required autocomplete="off" class="otp-input w-12 h-14 bg-white/5 border border-gray-500 rounded-lg text-center text-white text-2xl font-bold focus:outline-none focus:border-sky-500 focus:bg-white/10 transition-all duration-300">
                    <input type="text" maxlength="1" required autocomplete="off" class="otp-input w-12 h-14 bg-white/5 border border-gray-500 rounded-lg text-center text-white text-2xl font-bold focus:outline-none focus:border-sky-500 focus:bg-white/10 transition-all duration-300">
                    <input type="text" maxlength="1" required autocomplete="off" class="otp-input w-12 h-14 bg-white/5 border border-gray-500 rounded-lg text-center text-white text-2xl font-bold focus:outline-none focus:border-sky-500 focus:bg-white/10 transition-all duration-300">
                    <input type="text" maxlength="1" required autocomplete="off" class="otp-input w-12 h-14 bg-white/5 border border-gray-500 rounded-lg text-center text-white text-2xl font-bold focus:outline-none focus:border-sky-500 focus:bg-white/10 transition-all duration-300">
                    <input type="text" maxlength="1" required autocomplete="off" class="otp-input w-12 h-14 bg-white/5 border border-gray-500 rounded-lg text-center text-white text-2xl font-bold focus:outline-none focus:border-sky-500 focus:bg-white/10 transition-all duration-300">
                    <input type="text" maxlength="1" required autocomplete="off" class="otp-input w-12 h-14 bg-white/5 border border-gray-500 rounded-lg text-center text-white text-2xl font-bold focus:outline-none focus:border-sky-500 focus:bg-white/10 transition-all duration-300">
                </div>
                <input type="hidden" name="otp" id="hidden-otp">
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-bold py-3 px-4 rounded transition duration-200 shadow-lg tracking-wider">
                VERIFY ACCOUNT ACCESS
            </button>
            
            <div class="mt-5 text-center">
                <a href="{{ url_for('register') }}" class="text-sm text-sky-400 hover:text-sky-300 transition duration-200">
                    &larr; Back to Sign Up
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Entrance Animation
        gsap.from(".auth-card", { scale: 0.95, opacity: 0, duration: 0.6, ease: "power2.out" });

        // OTP Input Logic
        document.addEventListener("DOMContentLoaded", () => {
            const inputs = document.querySelectorAll(".otp-input");
            const hiddenOtp = document.getElementById("hidden-otp");

            // Update the hidden input with combined values
            const updateHiddenOtp = () => {
                hiddenOtp.value = Array.from(inputs).map(input => input.value).join("");
            };

            inputs.forEach((input, index) => {
                // Focus on the first empty box when clicking anywhere in the container (optional UX improvement)
                input.addEventListener("focus", () => {
                    input.select();
                });

                // Handle typing
                input.addEventListener("input", (e) => {
                    // Force numeric only
                    e.target.value = e.target.value.replace(/[^0-9]/g, "");

                    if (e.target.value !== "") {
                        // Move to the next input if available
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    updateHiddenOtp();
                });

                // Handle Backspace logic
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace") {
                        if (e.target.value === "") {
                            // If empty, move to the previous input
                            if (index > 0) {
                                inputs[index - 1].focus();
                                // Clear the previous input slightly for better UX
                                inputs[index - 1].value = "";
                            }
                        } else {
                            // Let the backspace clear the current box normally
                            e.target.value = "";
                        }
                        updateHiddenOtp();
                    }
                });

                // Handle Pasting full 6-digit code
                input.addEventListener("paste", (e) => {
                    e.preventDefault();
                    // Get pasted text and filter only numbers
                    const pastedData = e.clipboardData.getData("text").replace(/[^0-9]/g, "").slice(0, 6);
                    
                    if (pastedData.length > 0) {
                        // Fill boxes based on pasted string length
                        inputs.forEach((inp, i) => {
                            inp.value = pastedData[i] || "";
                        });
                        
                        updateHiddenOtp();

                        // Focus the next empty box, or the last box if all 6 were filled
                        const nextEmptyIndex = pastedData.length < inputs.length ? pastedData.length : inputs.length - 1;
                        inputs[nextEmptyIndex].focus();
                    }
                });
            });
            
            // Sync hidden input right before submission to be safe
            document.getElementById("otp-form").addEventListener("submit", () => {
                updateHiddenOtp();
            });
        });
    </script>
</body>
</html>
