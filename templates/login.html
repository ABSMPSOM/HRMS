<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRMS - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkBg: '#121212', cardBg: '#1e1e1e', brandPurple: '#b244d4' } } } }
    </script>
    
</head>
<body class="min-h-screen flex items-center justify-end bg-cover bg-center px-16"
        style="background-image: url('{{ url_for('static', filename='images/login_bg.png') }}'); background-size: cover; background-position: right; background-repeat: no-repeat;">

    <div class="auth-card bg-white/10 backdrop-blur-xl p-8 rounded-2xl border border-white/20 shadow-2xl w-[550px] h-auto mr-10">
        <div >
            <img src="{{url_for('static',filename='images/login_logo.png')}}" alt="HRMS Logo" class="mx-auto mb-2 w-[180px] h-auto rounded-full" >
        </div>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500 text-white text-xs p-2 rounded mb-8 text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-8">
                <label class="block text-xs text-gray-400 mb-1">Email / Login ID :-</label>
                <input type="email" name="email" required class="w-full bg-white/5 border border-gray-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brandPurple transition-all duration-300">
            </div>
            <div class="mb-10">
                <label class="block text-xs text-gray-400 mb-1">
                    Password :-
                </label>

                <div class="relative">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full bg-white/5 border border-gray-500 rounded-lg px-4 py-3 pr-12 text-white focus:outline-none focus:border-brandPurple transition-all duration-300">

                        <button
                            type="button"
                            id="togglePassword"
                            class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-white">

                            <i class="fa-solid fa-eye" id="eyeIcon"></i>

                        </button>
                </div>
            </div>
            <div class="flex items-center justify-between mb-8">

                <label class="flex items-center gap-3 cursor-pointer group">

                    <input
                        type="checkbox"
                        name="remember"
                        class="w-5 h-5 rounded accent-purple-500 cursor-pointer">

                        <span class="text-sm text-gray-300 group-hover:text-white transition">
                            Remember Me
                        </span>

                </label>

                <a
                    href="{{ url_for('forgot_password') }}"
                    class="text-sm text-purple-300 hover:text-white hover:underline transition">

                    Forgot Password?

                </a>

            </div>
            <button type="submit" class="w-full bg-brandPurple hover:bg-purple-700 text-white font-bold py-3 px-4 rounded transition duration-200 hover:scale-[1.02] transition-all duration-300">
                SIGN IN
            </button>
            
            <div class="text-center mt-4 text-xs">
                <a href="{{ url_for('register') }}" class="text-gray-400 hover:text-white transition">Don't have an Account? Sign Up</a>
            </div>
        </form>
    </div>

    
    <script>
        gsap.from(".auth-card", {
            x: 100,
            opacity: 0,
            scale: 0.95,
            duration: 1,
            ease: "power4.out"
        });
    </script>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
