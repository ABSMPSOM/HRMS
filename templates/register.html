<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRMS - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkBg: '#121212', cardBg: '#1e1e1e', brandPurple: '#b244d4' } } } }
    </script>
    <style>body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }</style>
</head>
<body class="bg-darkBg min-h-screen flex items-center justify-center">

    <div class="auth-card bg-cardBg p-8 rounded-lg border border-gray-700 shadow-xl w-full max-w-md">
        <div class="bg-gray-800 text-center py-3 rounded mb-6 text-sm font-semibold tracking-wider">
            APP/WEB LOGO
        </div>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-yellow-500 text-black text-xs p-2 rounded mb-4 text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST">
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-1">Role :-</label>
                <select name="role" required class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-brandPurple">
                    <option value="Employee">Employee</option>
                    <option value="Admin">Admin / HR Officer</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-1">Employee ID :-</label>
                <input type="text" name="employee_id" required class="w-full bg-transparent border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-brandPurple" placeholder="OIJODO20220001">
            </div>
            <div class="mb-4">
                <label class="block text-xs text-gray-400 mb-1">Email :-</label>
                <input type="email" name="email" required class="w-full bg-transparent border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-brandPurple">
            </div>
            <div class="mb-6">
                <label class="block text-xs text-gray-400 mb-1">Password :-</label>
                <input type="password" name="password" required class="w-full bg-transparent border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-brandPurple">
            </div>
            
            <button type="submit" class="w-full bg-brandPurple hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Sign Up
            </button>
            
            <div class="text-center mt-4 text-xs">
                <a href="{{ url_for('login') }}" class="text-gray-400 hover:text-white transition">Already have an account? Sign In</a>
            </div>
        </form>
    </div>
</body>
</html>
