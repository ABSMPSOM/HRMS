<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRMS - Sign Up</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: "#121212",
                        cardBg: "#1e1e1e",
                        brandPurple: "#b244d4"
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; overflow-x: hidden; }
        /* Hide scrollbar for cleaner look if content overflows */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #b244d4; }
    </style>

</head>

<body class="min-h-screen flex items-center justify-end bg-cover bg-center px-16 py-10"
style="background-image:url('{{ url_for('static', filename='images/login_bg.png') }}');">

    <div class="auth-card bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl rounded-2xl w-[550px] p-8 mr-10 max-h-[90vh] overflow-y-auto">

        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='images/login_logo.png') }}" alt="HRMS Logo" class="mx-auto w-[170px] h-auto rounded-full shadow-lg">
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-yellow-500 text-black font-bold text-center rounded-lg p-3 mb-6 text-sm shadow-md">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST" id="registerForm">

            <div class="mb-4">
                <label class="block text-sm text-gray-300 mb-2">Role</label>
                <select name="role" required class="w-full bg-gray-900/80 border border-gray-600 rounded-lg px-3 py-3 text-white focus:outline-none focus:border-brandPurple transition">
                    <option value="Employee">Employee</option>
                    <option value="Admin">Admin / HR Officer</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-2">Branch</label>
                    <select name="branch_id" class="w-full bg-gray-900/80 border border-gray-600 rounded-lg px-3 py-3 text-white focus:outline-none focus:border-brandPurple transition">
                        <option value="" selected>Select Branch</option>
                        {% for branch in branches %}
                            <option value="{{ branch.id }}">{{ branch.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-2">Department</label>
                    <select name="department_id" class="w-full bg-gray-900/80 border border-gray-600 rounded-lg px-3 py-3 text-white focus:outline-none focus:border-brandPurple transition">
                        <option value="" selected>Select Department</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-2">Employee ID</label>
                    <input type="text" name="employee_id" placeholder="OID2024001" required class="w-full bg-transparent border border-gray-600 rounded-lg px-3 py-3 text-white focus:outline-none focus:border-brandPurple transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-2">Monthly Wage (₹)</label>
                    <input type="number" step="0.01" name="monthly_wage" placeholder="50000.00" class="w-full bg-transparent border border-gray-600 rounded-lg px-3 py-3 text-white focus:outline-none focus:border-brandPurple transition">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-300 mb-2">Email Address</label>
                <input type="email" name="email" placeholder="john.doe@company.com" required class="w-full bg-transparent border border-gray-600 rounded-lg px-3 py-3 text-white focus:outline-none focus:border-brandPurple transition">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <input id="password" type="password" name="password" required class="w-full bg-transparent border border-gray-600 rounded-lg px-3 py-3 pr-12 text-white focus:outline-none focus:border-brandPurple transition">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-white transition">
                        <i id="eyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm text-gray-300 mb-2">Confirm Password</label>
                <div class="relative">
                    <input id="confirmPassword" type="password" name="confirm_password" required class="w-full bg-transparent border border-gray-600 rounded-lg px-3 py-3 pr-12 text-white focus:outline-none focus:border-brandPurple transition">
                    <button type="button" id="toggleConfirmPassword" class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-white transition">
                        <i id="confirmEyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <p id="passwordMessage" class="text-sm mt-2 h-4"></p>
            </div>

            <button type="submit" class="w-full bg-brandPurple hover:bg-purple-600 shadow-[0_0_15px_rgba(178,68,212,0.5)] transition duration-300 text-white font-bold py-3 rounded-lg tracking-wider">
                SIGN UP
            </button>

            <div class="text-center mt-6">
                <a href="{{ url_for('login') }}" class="text-gray-400 hover:text-brandPurple transition text-sm">
                    Already have an account? Sign In
                </a>
            </div>

        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Entry Animation
        gsap.from(".auth-card", { opacity: 0, x: 80, duration: 0.8, ease: "power3.out" });

        // Logic for Password Matching and Visibilty Toggles
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const passwordMessage = document.getElementById("passwordMessage");
        const form = document.getElementById("registerForm");

        function checkPasswords() {
            if (confirmPassword.value === "") {
                passwordMessage.textContent = "";
                return true;
            }
            if (password.value === confirmPassword.value) {
                passwordMessage.textContent = "Passwords match!";
                passwordMessage.className = "text-sm mt-2 text-green-400 h-4";
                return true;
            } else {
                passwordMessage.textContent = "Passwords do not match!";
                passwordMessage.className = "text-sm mt-2 text-red-400 h-4";
                return false;
            }
        }

        password.addEventListener("input", checkPasswords);
        confirmPassword.addEventListener("input", checkPasswords);

        form.addEventListener("submit", function(e) {
            if (!checkPasswords()) {
                e.preventDefault();
                alert("Please ensure your passwords match before submitting.");
            }
        });

        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            document.getElementById('eyeIcon').classList.toggle('fa-eye-slash');
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPassword.setAttribute('type', type);
            document.getElementById('confirmEyeIcon').classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
